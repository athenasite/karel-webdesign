name: 🔱 Athena Monorepo Publisher

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Site(s) om te publiceren (spatie-gescheiden, bv. "karel-portfolio-ath"). Leeg = alle sites.'
        required: false
        default: ''
      run_audit:
        description: 'Lighthouse Audit uitvoeren?'
        type: boolean
        default: false
  repository_dispatch:
    types: [publish_from_sheet]
  push:
    paths:
      - 'sites/**'
      - 'sites-external/**'
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

jobs:
  discovery:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set-sites.outputs.sites }}
      any_changed: ${{ steps.set-sites.outputs.any_changed }}
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Detect Changed Sites
        id: set-sites
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SITE="${{ github.event.client_payload.site }}"
            CHANGED_SITES="[\"$SITE\"]"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_SITES="${{ github.event.inputs.sites }}"
            if [ -n "$INPUT_SITES" ]; then
              CHANGED_SITES=$(echo "$INPUT_SITES" | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            else
              SITES_LIST=$(ls -d sites/*/ 2>/dev/null | xargs -I{} basename {})
              EXTERNAL_LIST=$(ls -d sites-external/*/ 2>/dev/null | xargs -I{} basename {})
              CHANGED_SITES=$(echo -e "$SITES_LIST\n$EXTERNAL_LIST" | jq -R -s -c 'split("\n") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            fi
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD~1"
            fi
            RAW_SITES=$(git diff --name-only "$BEFORE" ${{ github.event.after }} | grep -E '^(sites|sites-external)/' | cut -d/ -f2 | sort -u | tr -d '\r' | xargs)
            VALID_SITES=""
            for s in $RAW_SITES; do
              if [ -d "sites/$s" ] || [ -d "sites-external/$s" ]; then
                VALID_SITES="$VALID_SITES $s"
              fi
            done
            CHANGED_SITES=$(echo "$VALID_SITES" | xargs | jq -R -s -c 'split(" ") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          fi
          if [ "$CHANGED_SITES" = "[]" ] || [ -z "$CHANGED_SITES" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            echo "sites=$CHANGED_SITES" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: discovery
    if: needs.discovery.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.discovery.outputs.sites) }}
      fail-fast: false
    steps:
      - name: 🛰️ Checkout Monorepo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Push Subtree to Client Repo
        env:
          GITHUB_TOKEN: ${{ secrets.ATHENA_DEPLOY_TOKEN }}
          API_TOKEN_GITHUB: ${{ secrets.ATHENA_DEPLOY_TOKEN }}
          GH_TOKEN: ${{ secrets.ATHENA_DEPLOY_TOKEN }}
        run: |
          SITE="${{ matrix.site }}"
          BRANCH="${{ github.ref_name }}"
          
          # DYNAMISCHE TARGET ROUTING (v8.2)
          if [[ "${{ github.repository }}" == *"athena-x"* ]]; then
            TARGET_ORG="ath-x"
          else
            TARGET_ORG="athena-y-factory"
          fi

          if [ -d "sites/$SITE" ]; then
            PREFIX="sites/$SITE"
          elif [ -d "sites-external/$SITE" ]; then
            PREFIX="sites-external/$SITE"
          else
            echo "⚠️ Site $SITE not found in monorepo (likely moved to Vault). Skipping."
            exit 0
          fi
          
          TARGET_REPO="$TARGET_ORG/$SITE"
          
          if ! gh repo view "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✨ Creating repo $TARGET_REPO..."
            gh repo create "$TARGET_REPO" --public --description "Athena CMS Site: $SITE"
            sleep 5
          fi

          REMOTE_URL="https://x-access-token:${API_TOKEN_GITHUB}@github.com/${TARGET_REPO}.git"
          
          # Force check if prefix exists in history for subtree split
          if ! git log --format=oneline -- "$PREFIX" | head -n 1 > /dev/null; then
             echo "⚠️ No history found for $PREFIX. Skipping subtree split."
             exit 0
          fi

          SPLIT_SHA=$(git subtree split --prefix=$PREFIX $BRANCH)
          git push "$REMOTE_URL" "$SPLIT_SHA":refs/heads/main --force

          # KICKSTART gh-pages
          if ! gh api repos/$TARGET_REPO/branches/gh-pages >/dev/null 2>&1; then
            gh api --method POST /repos/$TARGET_REPO/git/refs -f ref='refs/heads/gh-pages' -f sha="$SPLIT_SHA" || true
            sleep 5
          fi

          # FAILSAFE Pages activatie
          if ! gh api repos/$TARGET_REPO/pages >/dev/null 2>&1; then
            gh api --method POST /repos/$TARGET_REPO/pages -f source='{"branch": "gh-pages", "path": "/"}' || true
          fi
